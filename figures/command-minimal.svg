<svg width="720" height="500" viewBox="0 0 720 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- Invoker -->
  <rect x="220" y="10" width="280" height="48" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.25"/>
  <text x="360" y="28" text-anchor="middle" font-size="9.5" fill="#64748b">Invoker</text>
  <text x="360" y="42" text-anchor="middle" font-size="10.5" font-weight="500" fill="#1e293b">AgentRunner / ToolRegistryFacade</text>
  <line x1="220" y1="46" x2="500" y2="46" stroke="#e2e8f0" stroke-width="0.75"/>
  <text x="360" y="54" text-anchor="middle" font-size="8" fill="#94a3b8">execute(cmd) · queue(cmd) · getLog()</text>

  <line x1="360" y1="58" x2="360" y2="74" stroke="#94a3b8" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="372" y="69" font-size="8" fill="#94a3b8">issues</text>

  <!-- Command interface -->
  <rect x="190" y="74" width="340" height="44" rx="3" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="360" y="92" text-anchor="middle" font-size="9.5" fill="#666">«interface»</text>
  <text x="360" y="106" text-anchor="middle" font-size="11.5" font-weight="500" fill="#111">AgentCommand</text>
  <line x1="190" y1="109" x2="530" y2="109" stroke="#e0e0e0" stroke-width="0.75"/>
  <text x="360" y="114" text-anchor="middle" font-size="8" fill="#888">execute() · undo() · getProvenance() → ProvenanceRecord</text>

  <!-- Branch to three command types -->
  <line x1="360" y1="118" x2="360" y2="132" stroke="#ccc" stroke-width="1"/>
  <line x1="118" y1="132" x2="602" y2="132" stroke="#ccc" stroke-width="1"/>
  <line x1="118" y1="132" x2="118" y2="148" stroke="#ccc" stroke-width="1"/>
  <line x1="360" y1="132" x2="360" y2="148" stroke="#ccc" stroke-width="1"/>
  <line x1="602" y1="132" x2="602" y2="148" stroke="#ccc" stroke-width="1"/>

  <!-- ToolInvocationCommand -->
  <rect x="18"  y="148" width="200" height="68" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="118" y="167" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">ToolInvocation</text>
  <text x="118" y="180" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">Command</text>
  <line x1="28" y1="184" x2="208" y2="184" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="118" y="196" text-anchor="middle" font-size="7.5" fill="#6b7280">toolName · inputs · agentId</text>
  <text x="118" y="207" text-anchor="middle" font-size="7.5" fill="#6b7280">schemaVersion · mementoRef</text>
  <text x="118" y="212" text-anchor="middle" font-size="7" fill="#3b82f6">evalVerdict attached post-exec</text>

  <!-- DataAccessCommand -->
  <rect x="260" y="148" width="200" height="68" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="360" y="167" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">DataAccess</text>
  <text x="360" y="180" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Command</text>
  <line x1="270" y1="184" x2="450" y2="184" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="360" y="196" text-anchor="middle" font-size="7.5" fill="#6b7280">productId · agentId · consentRef</text>
  <text x="360" y="207" text-anchor="middle" font-size="7.5" fill="#6b7280">lineageRef · auditToken</text>
  <text x="360" y="212" text-anchor="middle" font-size="7" fill="#7c3aed">consent intrinsic, not attached</text>

  <!-- MacroCommand -->
  <rect x="502" y="148" width="200" height="68" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="602" y="167" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">MacroCommand</text>
  <text x="602" y="180" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">(PlanExecution)</text>
  <line x1="512" y1="184" x2="692" y2="184" stroke="#dcfce7" stroke-width="0.5"/>
  <text x="602" y="196" text-anchor="middle" font-size="7.5" fill="#6b7280">delegates to sub-commands</text>
  <text x="602" y="207" text-anchor="middle" font-size="7.5" fill="#6b7280">single undo entry</text>
  <text x="602" y="212" text-anchor="middle" font-size="7" fill="#16a34a">workflow-level rollback</text>

  <!-- Arrows to log -->
  <line x1="118" y1="216" x2="118" y2="240" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="360" y1="216" x2="360" y2="240" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="602" y1="216" x2="602" y2="240" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="118" y1="240" x2="602" y2="240" stroke="#ddd" stroke-width="0.75"/>
  <line x1="360" y1="240" x2="360" y2="256" stroke="#ddd" stroke-width="0.75"/>
  <text x="372" y="250" font-size="8" fill="#aaa">logged to</text>

  <!-- Command Log -->
  <rect x="180" y="256" width="360" height="56" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1.25"/>
  <text x="360" y="274" text-anchor="middle" font-size="10" font-weight="500" fill="#166534">Command Log — EDP1</text>
  <line x1="190" y1="278" x2="530" y2="278" stroke="#bbf7d0" stroke-width="0.5"/>
  <text x="360" y="290" text-anchor="middle" font-size="8" fill="#166534">Agent Interaction Trace · governed data asset</text>
  <text x="360" y="302" text-anchor="middle" font-size="8" fill="#16a34a">versioned · schematised · queryable · EDP2 verdict attached</text>
  <text x="360" y="308" text-anchor="middle" font-size="7.5" fill="#15803d">agentId · toolName · inputs · output · mementoRef · schemaVersion</text>

  <!-- Stochasticity delta -->
  <line x1="360" y1="312" x2="360" y2="330" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="40" y="330" width="640" height="72" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="348" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — two agentic extensions</text>
  <line x1="60" y1="354" x2="660" y2="354" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="368" text-anchor="middle" font-size="8.5" fill="#78350f">1. Commands not idempotent — replay produces different results · rollback via Memento, not direct undo</text>
  <text x="360" y="382" text-anchor="middle" font-size="8.5" fill="#78350f">2. Pre-execution validation may be stochastic — LLM safety judge may approve or block differently on each run</text>
  <text x="360" y="396" text-anchor="middle" font-size="8" fill="#b45309">Command identifies the problem · Memento provides the restoration point · together = agentic rollback</text>

  <!-- Composability -->
  <line x1="360" y1="402" x2="360" y2="418" stroke="#eee" stroke-width="0.75"/>
  <rect x="60" y="418" width="600" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="360" y="436" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Memento · Abstract Factory · Facade · Decorator · Observer · Chain of Responsibility</text>

</svg>
