  <text x="100" y="220" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">Builder</text>
  <text x="100" y="237" text-anchor="middle" font-size="7.5" fill="#6b7280">wearable data · insights</text>

