  <text x="100" y="328" text-anchor="middle" font-size="7.5" fill="#6b7280">Insight Agent</text>
  <text x="100" y="340" text-anchor="middle" font-size="7.5" fill="#6b7280">Data Product Layer</text>
  <text x="100" y="352" text-anchor="middle" font-size="7.5" fill="#6b7280">Eval Suite</text>

  <rect x="278" y="280" width="165" height="72" rx="3" fill="#fafafa" stroke="#c4b5fd" stroke-width="0.75"/>
  <text x="360" y="298" text-anchor="middle" font-size="9" font-weight="500" fill="#6d28d9">LMSPipeline</text>
  <line x1="288" y1="303" x2="433" y2="303" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="360" y="316" text-anchor="middle" font-size="7.5" fill="#6b7280">+ LMS Connector</text>
  <text x="360" y="328" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Correlation Agent</text>
  <text x="360" y="340" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Enriched Data Products</text>
  <text x="360" y="352" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Extended Eval Suite</text>

  <rect x="538" y="280" width="165" height="72" rx="3" fill="#fafafa" stroke="#86efac" stroke-width="0.75"/>
  <text x="620" y="298" text-anchor="middle" font-size="9" font-weight="500" fill="#166534">ReflectivePipeline</text>
  <line x1="548" y1="303" x2="693" y2="303" stroke="#dcfce7" stroke-width="0.5"/>
  <text x="620" y="316" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Reflection Agent (sync)</text>
  <text x="620" y="328" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Session Annotator</text>
  <text x="620" y="340" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Metacognitive Tracker</text>
  <text x="620" y="352" text-anchor="middle" font-size="7.5" fill="#6b7280">+ Full Eval Suite</text>

  <!-- Stochasticity delta -->
  <line x1="360" y1="352" x2="360" y2="372" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="80" y="372" width="560" height="72" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="390" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — three agentic extensions</text>
  <line x1="100" y1="396" x2="620" y2="396" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="410" text-anchor="middle" font-size="8.5" fill="#78350f">1. Product behaviourally non-deterministic despite structural coherence</text>
  <text x="360" y="424" text-anchor="middle" font-size="8.5" fill="#78350f">2. Conditional construction — builders require fallback logic on connector failure</text>
  <text x="360" y="438" text-anchor="middle" font-size="8.5" fill="#78350f">3. Synchrony mismatch — async background + sync reflection requires handoff point</text>

  <!-- Composability -->
  <line x1="360" y1="444" x2="360" y2="460" stroke="#eee" stroke-width="0.75"/>
  <rect x="100" y="460" width="520" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="360" y="478" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Abstract Factory · Facade · Decorator · Singleton · Memento</text>

</svg>
