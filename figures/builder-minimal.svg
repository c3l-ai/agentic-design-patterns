  <text x="360" y="118" text-anchor="middle" font-size="11.5" font-weight="500" fill="#111">AgentPipelineBuilder</text>
  <line x1="190" y1="122" x2="530" y2="122" stroke="#e0e0e0" stroke-width="0.75"/>
  <text x="360" y="131" text-anchor="middle" font-size="8" fill="#888">configureIngestion()  ·  configureInsightAgents()</text>
  <text x="360" y="143" text-anchor="middle" font-size="8" fill="#888">configureReflection()  ·  configureEvals()  ·  build()</text>

  <!-- branch to 3 builders -->
  <line x1="360" y1="154" x2="360" y2="170" stroke="#ccc" stroke-width="1"/>
  <line x1="100" y1="170" x2="620" y2="170" stroke="#ccc" stroke-width="1"/>
  <line x1="100" y1="170" x2="100" y2="188" stroke="#ccc" stroke-width="1"/>
  <line x1="360" y1="170" x2="360" y2="188" stroke="#ccc" stroke-width="1"/>
  <line x1="620" y1="170" x2="620" y2="188" stroke="#ccc" stroke-width="1"/>

  <!-- Builder A -->
  <rect x="18" y="188" width="165" height="56" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
