  <text x="360" y="207" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">LMSPipeline</text>
  <text x="360" y="220" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Builder</text>
  <text x="360" y="237" text-anchor="middle" font-size="7.5" fill="#6b7280">+ LMS · correlation</text>

  <!-- Builder C -->
  <rect x="538" y="188" width="165" height="56" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="620" y="207" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Reflective</text>
  <text x="620" y="220" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">PipelineBuilder</text>
  <text x="620" y="237" text-anchor="middle" font-size="7.5" fill="#6b7280">+ reflection · metacognitive</text>

  <!-- builds arrows -->
  <line x1="100" y1="244" x2="100" y2="280" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="360" y1="244" x2="360" y2="280" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="620" y1="244" x2="620" y2="280" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="114" y="265" font-size="8" fill="#93c5fd">builds</text>
  <text x="374" y="265" font-size="8" fill="#c4b5fd">builds</text>
  <text x="634" y="265" font-size="8" fill="#86efac">builds</text>

