<svg width="720" height="540" viewBox="0 0 720 540" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- Director -->
  <rect x="240" y="10" width="240" height="56" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.25"/>
