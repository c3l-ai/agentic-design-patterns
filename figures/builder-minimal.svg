  <line x1="240" y1="50" x2="480" y2="50" stroke="#e2e8f0" stroke-width="0.75"/>
  <text x="360" y="59" text-anchor="middle" font-size="8" fill="#94a3b8">construct(builder: AgentPipelineBuilder)</text>

  <!-- Director to Abstract Builder -->
  <line x1="360" y1="66" x2="360" y2="86" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="372" y="79" font-size="8" fill="#94a3b8">uses</text>

  <!-- Abstract Builder -->
  <rect x="190" y="86" width="340" height="68" rx="3" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
