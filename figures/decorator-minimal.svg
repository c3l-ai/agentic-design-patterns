<svg width="560" height="640" viewBox="0 0 560 640" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- Client -->
  <rect x="180" y="10" width="200" height="36" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-width="1"/>
  <text x="280" y="28" text-anchor="middle" font-size="9.5" fill="#64748b">Client</text>
  <text x="280" y="40" text-anchor="middle" font-size="8" fill="#94a3b8">calls agent.execute(task)</text>
  <line x1="280" y1="46" x2="280" y2="62" stroke="#94a3b8" stroke-width="0.75" stroke-dasharray="3,2"/>

  <!-- Always-active label -->
  <text x="16" y="74" font-size="7.5" fill="#f97316" letter-spacing="0.5">ALWAYS ACTIVE</text>
  <line x1="112" y1="70" x2="544" y2="70" stroke="#fed7aa" stroke-width="0.5"/>

  <!-- GuardrailDecorator -->
  <rect x="40" y="62" width="480" height="48" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1.25"/>
  <text x="280" y="80" text-anchor="middle" font-size="10" font-weight="500" fill="#9a3412">GuardrailDecorator</text>
  <line x1="50" y1="84" x2="510" y2="84" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="280" y="95" text-anchor="middle" font-size="8" fill="#9a3412">intercept() → check SafetyConstraintStore → block or pass</text>
  <text x="280" y="105" text-anchor="middle" font-size="7.5" fill="#c2410c">outermost · safety-critical · reads singleton · always active</text>
  <line x1="280" y1="110" x2="280" y2="122" stroke="#fdba74" stroke-width="0.75"/>

  <!-- LoggingDecorator -->
  <rect x="60" y="122" width="440" height="48" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="280" y="140" text-anchor="middle" font-size="10" font-weight="500" fill="#9a3412">LoggingDecorator</text>
  <line x1="70" y1="144" x2="490" y2="144" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="280" y="155" text-anchor="middle" font-size="8" fill="#9a3412">intercept() → emit EDP1 trace (async) → pass</text>
  <text x="280" y="165" text-anchor="middle" font-size="7.5" fill="#c2410c">non-blocking · logs guardrail-approved output · always active</text>
  <line x1="280" y1="170" x2="280" y2="182" stroke="#fdba74" stroke-width="0.75"/>

  <!-- HITLDecorator -->
  <rect x="80" y="182" width="400" height="56" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="280" y="200" text-anchor="middle" font-size="10" font-weight="500" fill="#9a3412">HITLDecorator</text>
  <line x1="90" y1="204" x2="470" y2="204" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="280" y="215" text-anchor="middle" font-size="8" fill="#9a3412">intercept() → route to reviewer queue → await verdict → pass or block</text>
  <text x="280" y="226" text-anchor="middle" font-size="7.5" fill="#c2410c">always active in regulated contexts · adds latency · human oversight step</text>
  <text x="280" y="234" text-anchor="middle" font-size="7" fill="#92400e">not Proxy — adds a processing step, not just access control</text>
  <line x1="280" y1="238" x2="280" y2="252" stroke="#fdba74" stroke-width="0.75"/>

  <!-- Context-specific label -->
  <text x="16" y="264" font-size="7.5" fill="#0284c7" letter-spacing="0.5">CONTEXT-SPECIFIC</text>
  <line x1="125" y1="260" x2="544" y2="260" stroke="#bae6fd" stroke-width="0.5"/>

  <!-- RateLimitDecorator -->
  <rect x="100" y="252" width="360" height="48" rx="3" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="280" y="270" text-anchor="middle" font-size="10" font-weight="500" fill="#0369a1">RateLimitDecorator</text>
  <line x1="110" y1="274" x2="450" y2="274" stroke="#bae6fd" stroke-width="0.5"/>
  <text x="280" y="285" text-anchor="middle" font-size="8" fill="#0369a1">intercept() → check budget → queue / reject / pass</text>
  <text x="280" y="295" text-anchor="middle" font-size="7.5" fill="#0284c7">deterministic · no LLM calls · token budget tracking</text>
  <line x1="280" y1="300" x2="280" y2="312" stroke="#7dd3fc" stroke-width="0.75"/>

  <!-- ReflectionDecorator -->
  <rect x="120" y="312" width="320" height="60" rx="3" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="280" y="330" text-anchor="middle" font-size="10" font-weight="500" fill="#0369a1">ReflectionDecorator</text>
  <line x1="130" y1="334" x2="430" y2="334" stroke="#bae6fd" stroke-width="0.5"/>
  <text x="280" y="345" text-anchor="middle" font-size="8" fill="#0369a1">intercept() → generate → critique → revise → converge check</text>
  <text x="280" y="357" text-anchor="middle" font-size="7.5" fill="#0284c7">stochastic · may produce worse output · iteration cap required</text>
  <text x="280" y="366" text-anchor="middle" font-size="7.5" fill="#0284c7">convergence check: return best version, not latest</text>
  <line x1="280" y1="372" x2="280" y2="384" stroke="#7dd3fc" stroke-width="0.75"/>

  <!-- Base Agent -->
  <rect x="160" y="384" width="240" height="60" rx="3" fill="#1a1a1a" stroke="#374151" stroke-width="1"/>
  <text x="280" y="404" text-anchor="middle" font-size="10" font-weight="500" fill="#e5e7eb">BaseReActAgent</text>
  <line x1="170" y1="408" x2="390" y2="408" stroke="#374151" stroke-width="0.5"/>
  <text x="280" y="420" text-anchor="middle" font-size="8.5" fill="#9ca3af">think() · act() · observe()</text>
  <text x="280" y="432" text-anchor="middle" font-size="8" fill="#6b7280">no knowledge of wrappers</text>
  <text x="280" y="442" text-anchor="middle" font-size="7.5" fill="#4b5563">replaceable independently of decorator stack</text>

  <!-- Nesting bracket -->
  <path d="M 36 62 L 28 62 L 28 444 L 36 444" stroke="#fed7aa" stroke-width="1" fill="none"/>
  <text x="16" y="255" text-anchor="middle" font-size="7" fill="#f97316" transform="rotate(-90,16,255)">wraps</text>

  <!-- Stochasticity delta + proxy note -->
  <line x1="280" y1="444" x2="280" y2="460" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="40" y="460" width="480" height="72" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="280" y="478" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta + Pattern Tension</text>
  <line x1="60" y1="484" x2="500" y2="484" stroke="#fde68a" stroke-width="0.5"/>
  <text x="280" y="498" text-anchor="middle" font-size="8.5" fill="#78350f">ReflectionDecorator is stochastic — convergence check + iteration cap required</text>
  <text x="280" y="512" text-anchor="middle" font-size="8.5" fill="#78350f">Ordering: Guardrail → Logging → HITL → RateLimit → Reflection → Base</text>
  <text x="280" y="524" text-anchor="middle" font-size="8" fill="#b45309">Proxy absorbed: HITL adds a processing step, not just access control — Decorator, not Proxy</text>

  <!-- Composability -->
  <line x1="280" y1="532" x2="280" y2="548" stroke="#eee" stroke-width="0.75"/>
  <rect x="40" y="548" width="480" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="280" y="566" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Singleton · Abstract Factory · Command · Composite · Strategy</text>

</svg>
