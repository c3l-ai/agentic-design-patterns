<svg width="720" height="480" viewBox="0 0 720 480" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- Originator -->
  <rect x="210" y="10" width="300" height="48" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.25"/>
  <text x="360" y="28" text-anchor="middle" font-size="9.5" fill="#64748b">Originator</text>
  <text x="360" y="42" text-anchor="middle" font-size="11" font-weight="500" fill="#1e293b">AgentRunner / ConversationOrchestrator</text>
  <line x1="210" y1="46" x2="510" y2="46" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="360" y="53" text-anchor="middle" font-size="8" fill="#6b7280">createMemento() · restoreFrom(m) · executeWithCheckpoint()</text>

  <line x1="360" y1="58" x2="360" y2="76" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <text x="372" y="69" font-size="8" fill="#93c5fd">creates</text>

  <!-- Memento -->
  <rect x="160" y="76" width="400" height="56" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="360" y="94" text-anchor="middle" font-size="9.5" fill="#92400e">Memento — opaque to Caretaker</text>
  <text x="360" y="108" text-anchor="middle" font-size="11" font-weight="500" fill="#1a1814">ExecutionCheckpoint / StrategyContext / SessionSnapshot</text>
  <line x1="170" y1="112" x2="550" y2="112" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="123" text-anchor="middle" font-size="8" fill="#92400e">graphState · context · toolResults · schemaVersions · timestamp · consentState</text>

  <!-- Branch to three types -->
  <line x1="360" y1="132" x2="360" y2="148" stroke="#fbbf24" stroke-width="0.75"/>
  <line x1="118" y1="148" x2="602" y2="148" stroke="#fbbf24" stroke-width="0.75"/>
  <line x1="118" y1="148" x2="118" y2="164" stroke="#fbbf24" stroke-width="0.75"/>
  <line x1="360" y1="148" x2="360" y2="164" stroke="#fbbf24" stroke-width="0.75"/>
  <line x1="602" y1="148" x2="602" y2="164" stroke="#fbbf24" stroke-width="0.75"/>

  <!-- Type A -->
  <rect x="18"  y="164" width="200" height="60" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="118" y="182" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">Execution</text>
  <text x="118" y="195" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">Checkpointing</text>
  <line x1="28" y1="199" x2="208" y2="199" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="118" y="210" text-anchor="middle" font-size="7.5" fill="#6b7280">graph state before MacroCommand</text>
  <text x="118" y="220" text-anchor="middle" font-size="7" fill="#3b82f6">mementoRef on Command · rollback</text>

  <!-- Type B -->
  <rect x="260" y="164" width="200" height="60" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="360" y="182" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Strategy Context</text>
  <text x="360" y="195" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Handoff</text>
  <line x1="270" y1="199" x2="450" y2="199" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="360" y="210" text-anchor="middle" font-size="7.5" fill="#6b7280">working state on strategy switch</text>
  <text x="360" y="220" text-anchor="middle" font-size="7" fill="#7c3aed">receiveContext(m) · continuity</text>

  <!-- Type C -->
  <rect x="502" y="164" width="200" height="60" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="602" y="182" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Session State</text>
  <text x="602" y="195" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Preservation</text>
  <line x1="512" y1="199" x2="692" y2="199" stroke="#dcfce7" stroke-width="0.5"/>
  <text x="602" y="210" text-anchor="middle" font-size="7.5" fill="#6b7280">Mediator at coordination points</text>
  <text x="602" y="220" text-anchor="middle" font-size="7" fill="#16a34a">SessionContext.mementoRef · resume</text>

  <!-- Caretaker -->
  <line x1="118" y1="224" x2="118" y2="248" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="360" y1="224" x2="360" y2="248" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="602" y1="224" x2="602" y2="248" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="118" y1="248" x2="602" y2="248" stroke="#ddd" stroke-width="0.75"/>
  <line x1="360" y1="248" x2="360" y2="264" stroke="#ddd" stroke-width="0.75"/>
  <text x="372" y="258" font-size="8" fill="#aaa">stored by</text>

  <rect x="200" y="264" width="320" height="40" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="360" y="281" text-anchor="middle" font-size="10" font-weight="500" fill="#166534">Caretaker — MementoStore / CommandLog</text>
  <line x1="210" y1="285" x2="510" y2="285" stroke="#bbf7d0" stroke-width="0.5"/>
  <text x="360" y="297" text-anchor="middle" font-size="7.5" fill="#166534">stores opaquely · retrieves by mementoRef · enforces validity window</text>

  <!-- Command-Memento composition -->
  <line x1="360" y1="304" x2="360" y2="320" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="100" y="320" width="520" height="36" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="360" y="336" text-anchor="middle" font-size="8.5" font-weight="500" fill="#166534">Command + Memento = Agentic Rollback</text>
  <text x="360" y="349" text-anchor="middle" font-size="8" fill="#16a34a">Command identifies the problem · Memento provides the restoration point · mementoRef is the structural link</text>

  <!-- Stochasticity delta -->
  <line x1="360" y1="356" x2="360" y2="372" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="40" y="372" width="640" height="60" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="390" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — two agentic extensions</text>
  <line x1="60" y1="396" x2="660" y2="396" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="410" text-anchor="middle" font-size="8.5" fill="#78350f">1. Validity window — schema drift makes old checkpoints incompatible · schemaVersions metadata required</text>
  <text x="360" y="424" text-anchor="middle" font-size="8.5" fill="#78350f">2. LLM state not restorable — structural state only · rollback gives valid start point, not deterministic replay</text>

  <!-- Composability -->
  <line x1="360" y1="432" x2="360" y2="448" stroke="#eee" stroke-width="0.75"/>
  <rect x="60" y="448" width="600" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="360" y="466" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Command · Builder · Strategy · Singleton · Mediator · Observer</text>

</svg>
