<svg width="720" height="500" viewBox="0 0 720 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- AgentRunner (Context) -->
  <rect x="210" y="10" width="300" height="72" rx="3" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.25"/>
  <text x="360" y="29" text-anchor="middle" font-size="9.5" fill="#64748b">Context</text>
  <text x="360" y="43" text-anchor="middle" font-size="12" font-weight="500" fill="#1e293b">AgentRunner</text>
  <line x1="210" y1="48" x2="510" y2="48" stroke="#e2e8f0" stroke-width="0.75"/>
  <text x="360" y="58" text-anchor="middle" font-size="8" fill="#94a3b8">strategy: ReasoningStrategy</text>
  <text x="360" y="70" text-anchor="middle" font-size="8" fill="#94a3b8">execute(task)  ·  setStrategy(s)  ·  selectStrategy(task)</text>

  <!-- selection note -->
  <rect x="516" y="18" width="196" height="40" rx="2" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="0.75"/>
  <text x="614" y="33" text-anchor="middle" font-size="8" fill="#4338ca">selectStrategy(task)</text>
  <text x="614" y="47" text-anchor="middle" font-size="7.5" fill="#6366f1">rule-based or LLM-driven</text>
  <line x1="510" y1="36" x2="516" y2="36" stroke="#c7d2fe" stroke-width="0.75" stroke-dasharray="3,2"/>

  <!-- arrow down -->
  <line x1="360" y1="82" x2="360" y2="106" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="372" y="97" font-size="8" fill="#94a3b8">delegates to</text>

  <!-- Abstract Strategy -->
  <rect x="190" y="106" width="340" height="44" rx="3" fill="#fafafa" stroke="#bbb" stroke-width="1"/>
  <text x="360" y="124" text-anchor="middle" font-size="9.5" fill="#666">«interface»</text>
  <text x="360" y="139" text-anchor="middle" font-size="12" font-weight="500" fill="#111">ReasoningStrategy</text>
  <line x1="190" y1="142" x2="530" y2="142" stroke="#e0e0e0" stroke-width="0.75"/>
  <text x="360" y="147" text-anchor="middle" font-size="8.5" fill="#888">execute(task) → response</text>

  <!-- branch to 5 strategies -->
  <line x1="360" y1="150" x2="360" y2="166" stroke="#ccc" stroke-width="1"/>
  <line x1="68" y1="166" x2="652" y2="166" stroke="#ccc" stroke-width="1"/>
  <line x1="68" y1="166" x2="68" y2="184" stroke="#ccc" stroke-width="1"/>
  <line x1="204" y1="166" x2="204" y2="184" stroke="#ccc" stroke-width="1"/>
  <line x1="360" y1="166" x2="360" y2="184" stroke="#ccc" stroke-width="1"/>
  <line x1="516" y1="166" x2="516" y2="184" stroke="#ccc" stroke-width="1"/>
  <line x1="652" y1="166" x2="652" y2="184" stroke="#ccc" stroke-width="1"/>

  <!-- ReAct -->
  <rect x="8" y="184" width="120" height="64" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="68" y="202" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">ReAct</text>
  <text x="68" y="215" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">Strategy</text>
  <line x1="18" y1="219" x2="118" y2="219" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="68" y="230" text-anchor="middle" font-size="7.5" fill="#6b7280">think → act →</text>
  <text x="68" y="241" text-anchor="middle" font-size="7.5" fill="#6b7280">observe loop</text>

  <!-- Reflection -->
  <rect x="144" y="184" width="120" height="64" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="204" y="202" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Reflection</text>
  <text x="204" y="215" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Strategy</text>
  <line x1="154" y1="219" x2="254" y2="219" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="204" y="230" text-anchor="middle" font-size="7.5" fill="#6b7280">generate →</text>
  <text x="204" y="241" text-anchor="middle" font-size="7.5" fill="#6b7280">critique → revise</text>

  <!-- Planning -->
  <rect x="300" y="184" width="120" height="64" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="360" y="202" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Planning</text>
  <text x="360" y="215" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Strategy</text>
  <line x1="310" y1="219" x2="410" y2="219" stroke="#dcfce7" stroke-width="0.5"/>
  <text x="360" y="230" text-anchor="middle" font-size="7.5" fill="#6b7280">plan → execute</text>
  <text x="360" y="241" text-anchor="middle" font-size="7.5" fill="#6b7280">→ verify</text>

  <!-- ToolUse -->
  <rect x="456" y="184" width="120" height="64" rx="3" fill="#fff7ed" stroke="#fdba74" stroke-width="1"/>
  <text x="516" y="202" text-anchor="middle" font-size="9.5" font-weight="500" fill="#9a3412">ToolUse</text>
  <text x="516" y="215" text-anchor="middle" font-size="9.5" font-weight="500" fill="#9a3412">Strategy</text>
  <line x1="466" y1="219" x2="566" y2="219" stroke="#fed7aa" stroke-width="0.5"/>
  <text x="516" y="230" text-anchor="middle" font-size="7.5" fill="#6b7280">direct tool</text>
  <text x="516" y="241" text-anchor="middle" font-size="7.5" fill="#6b7280">invocation</text>

  <!-- MultiAgent -->
  <rect x="592" y="184" width="120" height="64" rx="3" fill="#fdf2f8" stroke="#f0abfc" stroke-width="1"/>
  <text x="652" y="202" text-anchor="middle" font-size="9.5" font-weight="500" fill="#86198f">MultiAgent</text>
  <text x="652" y="215" text-anchor="middle" font-size="9.5" font-weight="500" fill="#86198f">Strategy</text>
  <line x1="602" y1="219" x2="702" y2="219" stroke="#fae8ff" stroke-width="0.5"/>
  <text x="652" y="230" text-anchor="middle" font-size="7.5" fill="#6b7280">delegate to</text>
  <text x="652" y="241" text-anchor="middle" font-size="7.5" fill="#6b7280">specialised agents</text>

  <!-- runtime substitution arrow -->
  <path d="M 68 248 Q 68 266 200 274 Q 330 282 360 274" stroke="#94a3b8" stroke-width="0.75" stroke-dasharray="3,2" fill="none"/>
  <text x="200" y="288" text-anchor="middle" font-size="8" fill="#94a3b8">runtime substitution — client unaware</text>
  <polygon points="356,270 364,274 356,278" fill="#94a3b8"/>

  <!-- Stochasticity delta -->
  <line x1="360" y1="296" x2="360" y2="314" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="60" y="314" width="600" height="72" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="332" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — three agentic extensions</text>
  <line x1="80" y1="338" x2="640" y2="338" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="352" text-anchor="middle" font-size="8.5" fill="#78350f">1. Selection may be LLM-driven — stochastic, not deterministic</text>
  <text x="360" y="366" text-anchor="middle" font-size="8.5" fill="#78350f">2. Execution non-deterministic — correct selection ≠ correct output</text>
  <text x="360" y="380" text-anchor="middle" font-size="8.5" fill="#78350f">3. Mid-execution substitution requires explicit context handoff</text>

  <!-- Factory Method note -->
  <line x1="360" y1="386" x2="360" y2="402" stroke="#eee" stroke-width="0.75"/>
  <rect x="80" y="402" width="560" height="32" rx="3" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="0.75" stroke-dasharray="4,3"/>
  <text x="360" y="416" text-anchor="middle" font-size="8.5" fill="#4338ca">Factory Method: in agentic AI, creation and execution collapse.</text>
  <text x="360" y="428" text-anchor="middle" font-size="8.5" fill="#4338ca">selectStrategy() is absorbed into the AgentRunner context.</text>

  <!-- Composability -->
  <line x1="360" y1="434" x2="360" y2="450" stroke="#eee" stroke-width="0.75"/>
  <rect x="80" y="450" width="560" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="360" y="468" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Abstract Factory · Template Method · Observer · Memento · Decorator</text>

</svg>
