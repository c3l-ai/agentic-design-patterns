<svg width="720" height="500" viewBox="0 0 720 500" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- Abstract class header -->
  <rect x="10" y="10" width="700" height="24" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="360" y="26" text-anchor="middle" font-size="9" font-weight="500" fill="#166534">Abstract Class — AbstractAgentLoop · run() skeleton invariant · hook methods deferred to subclasses</text>

  <!-- Skeleton column -->
  <rect x="10" y="48" width="340" height="24" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="180" y="64" text-anchor="middle" font-size="9" font-weight="500" fill="#e2e8f0">Agent Loop Skeleton — run(goal, tools, memory, policies)</text>

  <!-- Steps -->
  <!-- Invariant step -->
  <rect x="10" y="80" width="340" height="22" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="20" y="95" font-size="8" fill="#166534">1. initState(goal)</text>
  <text x="340" y="95" text-anchor="end" font-size="7" fill="#16a34a">invariant</text>

  <!-- Hook step -->
  <rect x="10" y="106" width="340" height="22" rx="2" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="20" y="121" font-size="8" fill="#92400e">2. buildContext(s, memory, policies)</text>
  <text x="340" y="121" text-anchor="end" font-size="7" fill="#f59e0b">HOOK ← specialised</text>

  <!-- Hook step - planStep with Strategy note -->
  <rect x="10" y="132" width="340" height="22" rx="2" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="20" y="147" font-size="8" fill="#92400e">3. planStep(llm, context)</text>
  <text x="340" y="147" text-anchor="end" font-size="7" fill="#f59e0b">HOOK ← Strategy here</text>

  <!-- Invariant step -->
  <rect x="10" y="158" width="340" height="22" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="20" y="173" font-size="8" fill="#166534">4. violatesPolicy(plan, policies) → CoR chain</text>
  <text x="340" y="173" text-anchor="end" font-size="7" fill="#16a34a">invariant — cannot skip</text>

  <!-- Hook step -->
  <rect x="10" y="184" width="340" height="22" rx="2" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="20" y="199" font-size="8" fill="#92400e">5. repairPlan(plan, policies)</text>
  <text x="340" y="199" text-anchor="end" font-size="7" fill="#f59e0b">HOOK ← specialised</text>

  <!-- Invariant step -->
  <rect x="10" y="210" width="340" height="22" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="20" y="225" font-size="8" fill="#166534">6. executeTool(plan, tools) → ToolRegistryFacade</text>
  <text x="340" y="225" text-anchor="end" font-size="7" fill="#16a34a">invariant</text>

  <!-- Invariant step -->
  <rect x="10" y="236" width="340" height="22" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="20" y="251" font-size="8" fill="#166534">7. updateState(s, plan, result)</text>
  <text x="340" y="251" text-anchor="end" font-size="7" fill="#16a34a">invariant</text>

  <!-- Invariant step -->
  <rect x="10" y="262" width="340" height="22" rx="2" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="20" y="277" font-size="8" fill="#166534">8. writeMemory(memory, s, plan, result)</text>
  <text x="340" y="277" text-anchor="end" font-size="7" fill="#16a34a">invariant</text>

  <!-- Hook step -->
  <rect x="10" y="288" width="340" height="22" rx="2" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="20" y="303" font-size="8" fill="#92400e">9. shouldStop(state)</text>
  <text x="340" y="303" text-anchor="end" font-size="7" fill="#f59e0b">HOOK ← specialised · stochastic</text>

  <!-- Hook step -->
  <rect x="10" y="314" width="340" height="22" rx="2" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="20" y="329" font-size="8" fill="#92400e">10. finaliseAnswer(plan, state)</text>
  <text x="340" y="329" text-anchor="end" font-size="7" fill="#f59e0b">HOOK ← specialised</text>

  <!-- Invariant step -->
  <rect x="10" y="340" width="340" height="22" rx="2" fill="#1e293b" stroke="#475569" stroke-width="0.75"/>
  <text x="20" y="355" font-size="8" fill="#94a3b8">11. failSafe(state) → graceful degradation</text>
  <text x="340" y="355" text-anchor="end" font-size="7" fill="#64748b">invariant</text>

  <!-- Legend -->
  <rect x="10" y="370" width="340" height="20" rx="2" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
  <rect x="18" y="376" width="8" height="8" rx="1" fill="#f0fdf4" stroke="#86efac" stroke-width="0.75"/>
  <text x="30" y="384" font-size="7.5" fill="#166534">invariant — identical across all agents</text>
  <rect x="170" y="376" width="8" height="8" rx="1" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="2,1"/>
  <text x="182" y="384" font-size="7.5" fill="#92400e">hook — specialised by subclass</text>

  <!-- Concrete subclasses column -->
  <rect x="370" y="48" width="340" height="24" rx="3" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="540" y="64" text-anchor="middle" font-size="9" font-weight="500" fill="#e2e8f0">Concrete Subclasses</text>

  <!-- QA Agent -->
  <rect x="370" y="80" width="162" height="160" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="451" y="98" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">PersonalDataQA</text>
  <text x="451" y="111" text-anchor="middle" font-size="9.5" font-weight="500" fill="#1d4ed8">Agent</text>
  <line x1="380" y1="115" x2="522" y2="115" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="451" y="127" text-anchor="middle" font-size="7.5" fill="#6b7280">buildContext():</text>
  <text x="451" y="138" text-anchor="middle" font-size="7" fill="#3b82f6">data query context only</text>
  <text x="451" y="152" text-anchor="middle" font-size="7.5" fill="#6b7280">planStep():</text>
  <text x="451" y="163" text-anchor="middle" font-size="7" fill="#3b82f6">ToolUseStrategy</text>
  <text x="451" y="177" text-anchor="middle" font-size="7.5" fill="#6b7280">shouldStop():</text>
  <text x="451" y="188" text-anchor="middle" font-size="7" fill="#3b82f6">query fully answered?</text>
  <text x="451" y="202" text-anchor="middle" font-size="7.5" fill="#6b7280">finaliseAnswer():</text>
  <text x="451" y="213" text-anchor="middle" font-size="7" fill="#3b82f6">structured data response</text>
  <text x="451" y="234" text-anchor="middle" font-size="7" fill="#93c5fd">inherits invariant steps</text>

  <!-- Planner Agent -->
  <rect x="548" y="80" width="162" height="160" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
  <text x="629" y="98" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">PlannerCoach</text>
  <text x="629" y="111" text-anchor="middle" font-size="9.5" font-weight="500" fill="#6d28d9">Agent</text>
  <line x1="558" y1="115" x2="700" y2="115" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="629" y="127" text-anchor="middle" font-size="7.5" fill="#6b7280">buildContext():</text>
  <text x="629" y="138" text-anchor="middle" font-size="7" fill="#7c3aed">full session history</text>
  <text x="629" y="152" text-anchor="middle" font-size="7.5" fill="#6b7280">planStep():</text>
  <text x="629" y="163" text-anchor="middle" font-size="7" fill="#7c3aed">PlanningStrategy</text>
  <text x="629" y="177" text-anchor="middle" font-size="7.5" fill="#6b7280">shouldStop():</text>
  <text x="629" y="188" text-anchor="middle" font-size="7" fill="#7c3aed">quality threshold met?</text>
  <text x="629" y="202" text-anchor="middle" font-size="7.5" fill="#6b7280">finaliseAnswer():</text>
  <text x="629" y="213" text-anchor="middle" font-size="7" fill="#7c3aed">narrative study plan</text>
  <text x="629" y="234" text-anchor="middle" font-size="7" fill="#c4b5fd">inherits invariant steps</text>

  <!-- Strategy composition note -->
  <rect x="370" y="252" width="340" height="36" rx="3" fill="#f0f4ff" stroke="#c7d2fe" stroke-width="0.75"/>
  <text x="540" y="267" text-anchor="middle" font-size="8.5" font-weight="500" fill="#4338ca">Template Method + Strategy composition</text>
  <text x="540" y="280" text-anchor="middle" font-size="8" fill="#4338ca">planStep() hook calls Strategy · Template Method owns sequence · Strategy owns approach</text>

  <!-- Eval pipeline -->
  <rect x="370" y="300" width="340" height="68" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="540" y="318" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Eval Pipeline Template Method</text>
  <line x1="380" y1="322" x2="700" y2="322" stroke="#dcfce7" stroke-width="0.5"/>
  <text x="540" y="334" text-anchor="middle" font-size="8" fill="#166534">collect traces → runJudges() [HOOK] → aggregate</text>
  <text x="540" y="346" text-anchor="middle" font-size="8" fill="#166534">→ summarise → flagAnomalies()</text>
  <text x="540" y="360" text-anchor="middle" font-size="7.5" fill="#16a34a">Abstract Factory produces judges called at runJudges() hook</text>

  <!-- Stochasticity delta -->
  <line x1="360" y1="398" x2="360" y2="410" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="10" y="410" width="700" height="52" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="428" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — hook methods may be stochastic</text>
  <line x1="30" y1="434" x2="690" y2="434" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="448" text-anchor="middle" font-size="8.5" fill="#78350f">planStep() and shouldStop() involve LLM calls — same input may produce different output across runs</text>
  <text x="360" y="455" text-anchor="middle" font-size="7.5" fill="#b45309">Skeleton invariant guarantees sequence · cannot guarantee outcomes · hook-level eval coverage essential</text>

  <!-- Composability -->
  <line x1="360" y1="462" x2="360" y2="476" stroke="#eee" stroke-width="0.75"/>
  <rect x="50" y="476" width="620" height="20" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="360" y="490" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Strategy · Abstract Factory · Observer · Command · State · Chain of Responsibility</text>

</svg>
