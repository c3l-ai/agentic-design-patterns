<svg width="720" height="480" viewBox="0 0 720 480" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="'IBM Plex Mono', monospace">

  <!-- Three Subject headers -->
  <rect x="10"  y="10" width="218" height="52" rx="3" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.25"/>
  <text x="119" y="28" text-anchor="middle" font-size="9" fill="#64748b">Subject A</text>
  <text x="119" y="42" text-anchor="middle" font-size="10" font-weight="500" fill="#1d4ed8">CommandLog (EDP1)</text>
  <line x1="20" y1="46" x2="218" y2="46" stroke="#dbeafe" stroke-width="0.5"/>
  <text x="119" y="56" text-anchor="middle" font-size="7.5" fill="#6b7280">notify() on Command append</text>

  <rect x="251" y="10" width="218" height="52" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1.25"/>
  <text x="360" y="28" text-anchor="middle" font-size="9" fill="#64748b">Subject B</text>
  <text x="360" y="42" text-anchor="middle" font-size="10" font-weight="500" fill="#166534">LearnerWellnessProfile</text>
  <line x1="261" y1="46" x2="459" y2="46" stroke="#dcfce7" stroke-width="0.5"/>
  <text x="360" y="56" text-anchor="middle" font-size="7.5" fill="#6b7280">notify() on observation write</text>

  <rect x="492" y="10" width="218" height="52" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1.25"/>
  <text x="601" y="28" text-anchor="middle" font-size="9" fill="#64748b">Subject C</text>
  <text x="601" y="42" text-anchor="middle" font-size="10" font-weight="500" fill="#6d28d9">EvalVerdictStore (EDP2)</text>
  <line x1="502" y1="46" x2="700" y2="46" stroke="#ede9fe" stroke-width="0.5"/>
  <text x="601" y="56" text-anchor="middle" font-size="7.5" fill="#6b7280">notify() on verdict attach</text>

  <!-- Observer label -->
  <text x="360" y="80" text-anchor="middle" font-size="8" fill="#ccc" letter-spacing="1.5">REGISTERED OBSERVERS</text>
  <line x1="10"  y1="83" x2="148" y2="83" stroke="#eee" stroke-width="0.5"/>
  <line x1="572" y1="83" x2="710" y2="83" stroke="#eee" stroke-width="0.5"/>

  <!-- Subject A → Observers -->
  <line x1="119" y1="62" x2="119" y2="92" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="44"  y1="92" x2="194" y2="92" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="44"  y1="92" x2="44"  y2="102" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="119" y1="92" x2="119" y2="102" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="194" y1="92" x2="194" y2="102" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>

  <rect x="10"  y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="44"  y="118" text-anchor="middle" font-size="7.5" fill="#1d4ed8">Pattern</text>
  <text x="44"  y="129" text-anchor="middle" font-size="7.5" fill="#1d4ed8">Watcher</text>
  <text x="44"  y="143" text-anchor="middle" font-size="7" fill="#6b7280">pull · stoch</text>

  <rect x="85"  y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="119" y="118" text-anchor="middle" font-size="7.5" fill="#1d4ed8">EDP3</text>
  <text x="119" y="129" text-anchor="middle" font-size="7.5" fill="#1d4ed8">Pipeline</text>
  <text x="119" y="143" text-anchor="middle" font-size="7" fill="#6b7280">pull · det</text>

  <rect x="160" y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#93c5fd" stroke-width="0.75"/>
  <text x="194" y="118" text-anchor="middle" font-size="7.5" fill="#1d4ed8">Audit</text>
  <text x="194" y="129" text-anchor="middle" font-size="7.5" fill="#1d4ed8">Log</text>
  <text x="194" y="143" text-anchor="middle" font-size="7" fill="#6b7280">push · det</text>

  <!-- Subject B → Observers -->
  <line x1="360" y1="62" x2="360" y2="92" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="285" y1="92" x2="435" y2="92" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="285" y1="92" x2="285" y2="102" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="360" y1="92" x2="360" y2="102" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="435" y1="92" x2="435" y2="102" stroke="#86efac" stroke-width="0.75" stroke-dasharray="3,2"/>

  <rect x="251" y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#86efac" stroke-width="0.75"/>
  <text x="285" y="118" text-anchor="middle" font-size="7.5" fill="#166534">Coach</text>
  <text x="285" y="129" text-anchor="middle" font-size="7.5" fill="#166534">Dashboard</text>
  <text x="285" y="143" text-anchor="middle" font-size="7" fill="#6b7280">push · det</text>

  <rect x="326" y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#86efac" stroke-width="0.75"/>
  <text x="360" y="118" text-anchor="middle" font-size="7.5" fill="#166534">Alert</text>
  <text x="360" y="129" text-anchor="middle" font-size="7.5" fill="#166534">System</text>
  <text x="360" y="143" text-anchor="middle" font-size="7" fill="#6b7280">push · det</text>

  <rect x="401" y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#86efac" stroke-width="0.75"/>
  <text x="435" y="118" text-anchor="middle" font-size="7.5" fill="#166534">Longitudinal</text>
  <text x="435" y="129" text-anchor="middle" font-size="7.5" fill="#166534">Analysis</text>
  <text x="435" y="143" text-anchor="middle" font-size="7" fill="#6b7280">pull · stoch</text>

  <!-- Subject C → Observers -->
  <line x1="601" y1="62" x2="601" y2="92" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="526" y1="92" x2="676" y2="92" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="526" y1="92" x2="526" y2="102" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="601" y1="92" x2="601" y2="102" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
  <line x1="676" y1="92" x2="676" y2="102" stroke="#c4b5fd" stroke-width="0.75" stroke-dasharray="3,2"/>

  <rect x="492" y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#c4b5fd" stroke-width="0.75"/>
  <text x="526" y="118" text-anchor="middle" font-size="7.5" fill="#6d28d9">EDP3</text>
  <text x="526" y="129" text-anchor="middle" font-size="7.5" fill="#6d28d9">Pipeline</text>
  <text x="526" y="143" text-anchor="middle" font-size="7" fill="#6b7280">pull · det</text>

  <rect x="568" y="102" width="68" height="48" rx="2" fill="#fef2f2" stroke="#fca5a5" stroke-width="0.75"/>
  <text x="602" y="118" text-anchor="middle" font-size="7.5" fill="#dc2626">Safety</text>
  <text x="602" y="129" text-anchor="middle" font-size="7.5" fill="#dc2626">Monitor</text>
  <text x="602" y="143" text-anchor="middle" font-size="7" fill="#dc2626">push · escalates</text>

  <rect x="642" y="102" width="68" height="48" rx="2" fill="#fafafa" stroke="#c4b5fd" stroke-width="0.75"/>
  <text x="676" y="118" text-anchor="middle" font-size="7.5" fill="#6d28d9">Audit</text>
  <text x="676" y="129" text-anchor="middle" font-size="7.5" fill="#6d28d9">Log</text>
  <text x="676" y="143" text-anchor="middle" font-size="7" fill="#6b7280">push · det</text>

  <!-- Push/pull legend -->
  <rect x="10" y="163" width="700" height="24" rx="2" fill="#fafafa" stroke="#eee" stroke-width="0.5"/>
  <text x="185" y="179" text-anchor="middle" font-size="7.5" fill="#6b7280">push = full state in notification · time-sensitive · no round-trip</text>
  <line x1="360" y1="167" x2="360" y2="183" stroke="#eee" stroke-width="0.5"/>
  <text x="535" y="179" text-anchor="middle" font-size="7.5" fill="#6b7280">pull = minimal notification · Observer queries · high-volume streams</text>

  <!-- EDP loop -->
  <line x1="360" y1="187" x2="360" y2="203" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="30" y="203" width="660" height="56" rx="3" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="360" y="220" text-anchor="middle" font-size="9.5" font-weight="500" fill="#166534">Observer closes the Eval Data Product Loop</text>
  <line x1="50" y1="226" x2="670" y2="226" stroke="#bbf7d0" stroke-width="0.5"/>
  <text x="360" y="240" text-anchor="middle" font-size="8.5" fill="#166534">Command → EDP1 · notify() → EvalJudges · EDP2 attached · notify() → EDP3 + SafetyMonitor</text>
  <text x="360" y="252" text-anchor="middle" font-size="7.5" fill="#16a34a">Without Observer: polling · batch scheduling · tight coupling · delayed safety response</text>

  <!-- Stochasticity delta -->
  <line x1="360" y1="259" x2="360" y2="275" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="30" y="275" width="660" height="72" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="360" y="293" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — two agentic extensions</text>
  <line x1="50" y1="299" x2="670" y2="299" stroke="#fde68a" stroke-width="0.5"/>
  <text x="360" y="313" text-anchor="middle" font-size="8.5" fill="#78350f">1. Observer callbacks may be stochastic — LLM-based Observers produce different analyses on identical notifications</text>
  <text x="360" y="327" text-anchor="middle" font-size="8.5" fill="#78350f">2. Notification ordering non-deterministic — use event timestamps + sequence IDs, not notification arrival order</text>
  <text x="360" y="341" text-anchor="middle" font-size="8" fill="#b45309">Each Observer type needs its own eval coverage — not just the Subject</text>

  <!-- Composability -->
  <line x1="360" y1="347" x2="360" y2="363" stroke="#eee" stroke-width="0.75"/>
  <rect x="50" y="363" width="620" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="360" y="381" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Command · Abstract Factory · Singleton · Mediator · Memento · Decorator · Chain of Responsibility</text>

</svg>
