  <text x="556" y="190" text-anchor="middle" font-size="7.5" fill="#166534">Output</text>
  <text x="556" y="202" text-anchor="middle" font-size="7.5" fill="#166534">Judge</text>
  <text x="556" y="212" text-anchor="middle" font-size="7" fill="#9ca3af">leaf</text>
