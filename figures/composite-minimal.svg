  <text x="636" y="274" text-anchor="middle" font-size="8.5" fill="#6b7280">AgentRunner eval step</text>

  <!-- Stochasticity delta -->
  <line x1="380" y1="284" x2="380" y2="300" stroke="#ccc" stroke-width="0.75" stroke-dasharray="3,2"/>
  <rect x="60" y="300" width="640" height="72" rx="3" fill="#fffbeb" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="380" y="318" text-anchor="middle" font-size="9.5" font-weight="500" fill="#92400e">⚠  Stochasticity Delta — two agentic extensions</text>
  <line x1="80" y1="324" x2="680" y2="324" stroke="#fde68a" stroke-width="0.5"/>
  <text x="380" y="338" text-anchor="middle" font-size="8.5" fill="#78350f">1. Result aggregation is a reasoning task — synthesis at composite nodes is stochastic, requires its own eval</text>
  <text x="380" y="352" text-anchor="middle" font-size="8.5" fill="#78350f">2. Failure propagation is silent — quality gates required at each level before results propagate upward</text>
  <text x="380" y="366" text-anchor="middle" font-size="8" fill="#b45309">Composite = hierarchical ownership · Mediator = peer coordination · both appear in NLI simultaneously</text>

  <!-- Composability -->
  <line x1="380" y1="372" x2="380" y2="388" stroke="#eee" stroke-width="0.75"/>
  <rect x="80" y="388" width="600" height="28" rx="3" fill="#f9fafb" stroke="#e5e7eb" stroke-width="0.75"/>
  <text x="380" y="406" text-anchor="middle" font-size="8.5" fill="#6b7280">Composes with: Builder · Mediator · Abstract Factory · Decorator · Strategy</text>

</svg>
