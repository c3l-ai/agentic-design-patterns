  <line x1="612" y1="245" x2="750" y2="245" stroke="#eee" stroke-width="0.5"/>
  <line x1="124" y1="216" x2="124" y2="256" stroke="#93c5fd" stroke-width="0.75" stroke-dasharray="3,2"/>
