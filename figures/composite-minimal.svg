  <rect x="44"  y="256" width="160" height="28" rx="2" fill="#fafafa" stroke="#ddd" stroke-width="0.75"/>
  <text x="124" y="274" text-anchor="middle" font-size="8.5" fill="#6b7280">API Layer / nli_api</text>
