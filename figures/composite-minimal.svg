  <text x="124" y="141" text-anchor="middle" font-size="7.5" fill="#93c5fd">synthesises via reasoning step</text>

  <rect x="266" y="100" width="228" height="44" rx="3" fill="#faf5ff" stroke="#c4b5fd" stroke-width="1"/>
